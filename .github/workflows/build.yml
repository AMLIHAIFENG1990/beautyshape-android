name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      env:
        CREATE_USER: "no"
    steps:
      - uses: actions/checkout@v4

      - name: Increase Gradle memory
        run: |
          cd android_app
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> gradle.properties || true

      - name: Build APK
        run: |
          cd android_app
          export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=512m"
          yes 2>/dev/null | buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beautyshape-apk
          path: android_app/bin/*.apk