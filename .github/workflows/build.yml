name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      env:
        CREATE_USER: "no"
        _JAVA_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
    steps:
      - uses: actions/checkout@v4

      - name: Build APK (armeabi-v7a only)
        run: |
          cd android_app
          yes 2>/dev/null | buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          _JAVA_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beautyshape-apk
          path: android_app/bin/*.apk