name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      env:
        CREATE_USER: "no"
        BUILDOZER_WARN_ON_ROOT: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Accept all Android SDK licenses
        run: |
          SDK_DIR="/github/home/.buildozer/android/platform/android-sdk"
          mkdir -p "/licenses"
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > "/licenses/android-sdk-preview-license"
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" > "/licenses/android-sdk-license"
          echo -e "\n504667f4c0de7af1a06de9f4b1727b84351f2910" > "/licenses/intel-android-extra-license"
          yes | sdkmanager --sdk_root="" --licenses || true

      - name: Build APK
        run: |
          cd android_app
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: beautyshape-apk
          path: android_app/bin/*.apk